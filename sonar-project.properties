sonar.organization=vib-harsh
sonar.projectKey=Vib-Harsh_SocityOne

# Set the source directory to the current directory
sonar.sources=.

# Exclude unnecessary directories from analysis
sonar.exclusions=**/node_modules/**, **/.github/**, **/build/**, **/dist/**, **/.next/**

# Strict Mode: Force the CI pipeline to wait for the Quality Gate result.
# If the Quality Gate fails (e.g. issues, bugs, coverage not met), the pipeline will fail.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
