<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for modern premium styling -->
  <defs>
    <!-- Primary Gradients -->
    <linearGradient id="violet-glow" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>

    <linearGradient id="cyan-glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>

    <linearGradient id="accent-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F43F5E" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- Luxury Metallic Gold Accent -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="70%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Transparent Overlay for Highlights -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0" />
    </linearGradient>

    <!-- Ambient Shadow Filters for Premium Depth -->
    <filter id="neon-glow-violet" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="drop-shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#4F46E5" flood-opacity="0.3" />
    </filter>

    <filter id="inner-shadow">
      <feOffset dx="0" dy="3"/>
      <feGaussianBlur stdDeviation="3" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="black" flood-opacity="0.6" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Ambient background glow (keeps logo look gorgeous on any background) -->
  <circle cx="256" cy="256" r="180" fill="url(#violet-glow)" opacity="0.06" filter="url(#neon-glow-violet)" />

  <!-- Main Logo Container -->
  <g filter="url(#drop-shadow)">
    
    <!-- Outer Shield / Hexagonal Frame (Represents Protection & Community Boundaries) -->
    <path d="M 256,36 
             L 426,134 
             L 426,330 
             L 256,428 
             L 86,330 
             L 86,134 Z" 
          fill="none" 
          stroke="url(#cyan-glow)" 
          stroke-width="4.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.25" />

    <!-- Inner Shield (Slightly smaller, glowing dash) -->
    <path d="M 256,48 
             L 412,138 
             L 412,322 
             L 256,412 
             L 100,322 
             L 100,138 Z" 
          fill="none" 
          stroke="url(#violet-glow)" 
          stroke-width="1.5" 
          stroke-dasharray="12,12" 
          stroke-linecap="round" 
          opacity="0.4" />

    <!-- Isometric Community / Home Roof Concept (Double-folded ribbons) -->
    
    <!-- Ribbon Part A: Top Arch of the "S" and Roof -->
    <path d="M 256,88 
             L 380,160 
             L 380,210 
             L 256,138 
             L 172,186 
             L 172,236 
             L 256,188 
             L 300,214 
             C 334,234 350,266 350,300 
             C 350,344 312,374 256,406 
             L 230,391 
             L 230,340 
             L 256,355 
             C 290,335 304,315 304,296 
             C 304,282 296,270 280,260 
             L 256,246 
             L 132,174 Z" 
          fill="url(#violet-glow)" />

    <!-- Ribbon Part B: Bottom Arch of the "S" and Base -->
    <path d="M 256,424 
             L 132,352 
             L 132,302 
             L 256,374 
             L 340,326 
             L 340,276 
             L 256,324 
             L 212,298 
             C 178,278 162,246 162,212 
             C 162,168 200,138 256,106 
             L 282,121 
             L 282,172 
             L 256,157 
             C 222,177 208,197 208,216 
             C 208,230 216,242 232,252 
             L 256,266 
             L 380,338 Z" 
          fill="url(#cyan-glow)" />

    <!-- Ribbon Part C: Center Pillar "1" (Symbolizing 'One', Unity, and the Central High-Rise) -->
    <!-- The vertical column weaves through the center, perfectly forming a "1" in the heart of S -->
    <path d="M 242,142 
             L 270,126 
             L 270,336 
             L 242,352 Z" 
          fill="url(#accent-glow)" 
          opacity="0.9" />

    <!-- Glowing Core Point (The "One" beacon / sun of community) -->
    <circle cx="256" cy="236" r="14" fill="url(#gold-grad)" filter="url(#neon-glow-violet)" />
    
    <!-- Inner high-tech detail: Accent light dots representing community connectivity -->
    <circle cx="172" cy="186" r="3" fill="#67E8F9" opacity="0.8" />
    <circle cx="340" cy="326" r="3" fill="#F472B6" opacity="0.8" />
    <circle cx="256" cy="88" r="4" fill="#FFFFFF" opacity="0.9" />
    <circle cx="256" cy="424" r="4" fill="#FFFFFF" opacity="0.9" />
  </g>
</svg>
