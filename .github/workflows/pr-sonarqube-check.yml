name: PR Code Quality Check and Auto-Merge

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Disable shallow clones for better relevancy of analysis
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Client dependencies
        run: |
          cd Client
          yarn install --frozen-lockfile

      - name: Install React Native app dependencies
        run: |
          cd SocityOne
          npm ci

      - name: Run React Native app tests with coverage
        run: |
          cd SocityOne
          npm run test -- --coverage

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd Server
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run Python tests with coverage
        env:
          FERNET_KEY: "dummy_key"
          DATABASE_PASSWORD: "dummy_password"
          SUPER_ADMIN_EMAIL: "admin@example.com"
          SUPER_ADMIN_PASSWORD: "dummy_password"
        run: |
          cd Server
          PYTHONPATH=. pytest --cov=app --cov-report=xml

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  auto-merge:
    name: Auto Merge PR
    needs: sonarcloud
    # Only run auto-merge on pull requests, not pushes to master
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable Auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --auto --merge --delete-branch --repo ${{ github.repository }}
